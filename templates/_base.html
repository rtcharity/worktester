<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Work Trial{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px; margin: 3rem auto; padding: 0 1.25rem; line-height: 1.5;
    }
    h1 { font-size: 1.6rem; }
    .card { border: 1px solid rgba(127,127,127,.3); border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
    button, .btn {
      font-size: 1rem; padding: .65rem 1.1rem; border-radius: 6px; border: 0;
      background: #2f6feb; color: white; cursor: pointer; text-decoration: none; display: inline-block;
    }
    button:disabled { background: #888; cursor: not-allowed; }
    label.ack { display: flex; gap: .6rem; align-items: flex-start; margin: 1rem 0; }
    .muted { color: #888; font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid rgba(127,127,127,.25); vertical-align: top; }
    code { background: rgba(127,127,127,.15); padding: .1rem .35rem; border-radius: 4px; }
    .flash { background: #fff3cd; color: #664d03; border: 1px solid #ffda6a; border-radius: 6px; padding: .6rem 1rem; }
    .flash.error { background: #fde8e8; color: #7f1d1d; border-color: #f4a4a4; }
    .expired-banner { background: #fde8e8; color: #7f1d1d; border: 1px solid #f4a4a4; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; }
    .expired-banner p { margin: .25rem 0 0; font-size: .95rem; }
    .success-banner { display: flex; align-items: flex-start; gap: 1rem; background: #d1f0da; color: #0f5323; border: 1px solid #75d99b; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; }
    .success-banner p { margin: .25rem 0 0; font-size: .95rem; }
    .success-icon { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
    hr { border: 0; border-top: 1px solid rgba(127,127,127,.25); margin: 1.5rem 0; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  <script>
    document.querySelectorAll('time.localtime[datetime]').forEach(el => {
      const d = new Date(el.getAttribute('datetime'));
      if (!isNaN(d)) {
        el.textContent = new Intl.DateTimeFormat(undefined, {
          weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
        }).format(d);
      }
    });
  </script>
</body>
</html>
