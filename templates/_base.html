<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Work Trial{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px; margin: 3rem auto; padding: 0 1.25rem; line-height: 1.5;
    }
    h1 { font-size: 1.6rem; }
    .card { border: 1px solid rgba(127,127,127,.3); border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
    button, .btn {
      font-size: 1rem; padding: .65rem 1.1rem; border-radius: 6px; border: 0;
      background: #2f6feb; color: white; cursor: pointer; text-decoration: none; display: inline-block;
    }
    button:disabled { background: #888; cursor: not-allowed; }
    label.ack { display: flex; gap: .6rem; align-items: flex-start; margin: 1rem 0; }
    .muted { color: #888; font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid rgba(127,127,127,.25); vertical-align: top; }
    code { background: rgba(127,127,127,.15); padding: .1rem .35rem; border-radius: 4px; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
